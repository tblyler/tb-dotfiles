# loaded only on this host, via MISE_ENV="$(hostname -s)" in .zshenv (see
# the comment there) — mise merges this on top of mise.toml and
# mise.linux.toml, not in place of them. other machines this repo
# bootstraps never set MISE_ENV=aptitude, so this file is inert for them.
#
# prerequisite: mise doesn't install flatpak or configure remotes itself.
# before `mise bootstrap` on a fresh instance of this host:
#   flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo
#
# fr.handbrake.ghb.Plugin.IntelMediaSDK is deliberately left out — it comes
# from a separate `intelmediasdk-origin` remote, not flathub, so it isn't
# reproducible through this mechanism alone; add that remote and install it
# manually if needed. runtime/platform deps (org.freedesktop.Platform*,
# GL/VAAPI, GNOME/KDE platform, Breeze theme, codecs) are left out too —
# those are pulled in automatically as dependencies of the apps below, not
# top-level installs.
[bootstrap.packages]
"flatpak:com.bitwarden.desktop" = "latest"
"flatpak:com.discordapp.Discord" = "latest"
"flatpak:com.github.tchx84.Flatseal" = "latest"
"flatpak:com.google.Chrome" = "latest"
"flatpak:com.makemkv.MakeMKV" = "latest"
"flatpak:com.moonlight_stream.Moonlight" = "latest"
"flatpak:com.prusa3d.PrusaSlicer" = "latest"
"flatpak:com.valvesoftware.Steam" = "latest"
"flatpak:fr.handbrake.ghb" = "latest"
"flatpak:io.github.input_leap.input-leap" = "latest"
"flatpak:org.chromium.Chromium" = "latest"
"flatpak:org.mozilla.firefox" = "latest"
"flatpak:org.mozilla.thunderbird_esr" = "latest"
"flatpak:org.onlyoffice.desktopeditors" = "latest"
"flatpak:org.qbittorrent.qBittorrent" = "latest"
"flatpak:org.remmina.Remmina" = "latest"
"flatpak:org.signal.Signal" = "latest"

# ghostty's font-family (see .config/ghostty/config) is "GoMono Nerd Font" —
# the Nerd Fonts–patched build of Go's own monospace typeface, not a
# go-language tool. macOS gets it declaratively via brew-cask (see
# mise.macos.toml); no apt package exists for it on Linux (and ghostty
# itself is deliberately manual-install here too, see mise.toml's
# [bootstrap.hooks.final] note), so this pulls the tarball straight from the
# latest nerd-fonts release instead — .tar.xz over the .zip they also
# publish, so extraction needs only tar (xz-utils ships as part of base
# Debian/dpkg already) instead of pulling in unzip as a new package solely
# for this. GitHub's /releases/latest/download/ redirect resolves to the
# current release without an API call, so there's no version to bump here —
# accept the drift risk in exchange for one less thing to keep in sync
[bootstrap.hooks.final]
run = '''
font_dir="$HOME/.local/share/fonts/GoMonoNerdFont"
if [ ! -d "$font_dir" ] || [ -z "$(ls -A "$font_dir" 2>/dev/null)" ]; then
	mkdir -p "$font_dir"
	tmp_tar="$(mktemp)"
	curl -fsSL "https://github.com/ryanoasis/nerd-fonts/releases/latest/download/Go-Mono.tar.xz" -o "$tmp_tar"
	tar -xJf "$tmp_tar" -C "$font_dir"
	rm -f "$tmp_tar"
	command -v fc-cache > /dev/null 2>&1 && fc-cache -f "$font_dir"
fi
'''
