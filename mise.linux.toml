# loaded automatically on Linux only (see the auto_env comment in mise.toml)
[bootstrap.packages]
# nvim-treesitter compiles parsers from source at install time and needs a
# C compiler + linker on PATH — macOS ships one via Xcode CLT already
"apt:build-essential" = "latest"

"apt:curl" = "latest"

# fallback system nvim for contexts where mise isn't activated (root, a
# recovery shell, GUI launchers with a stripped PATH) — the mise-managed
# `neovim` in [tools] (mise.toml) takes precedence whenever mise is activated
"apt:neovim" = "latest"
