[settings]
lockfile = true
dotfiles.root = "~/.dotfiles"

# lets mise.linux.toml / mise.macos.toml (and their `config.<os>.toml`
# symlink targets below) load automatically based on the host OS. this
# setting alone does nothing here — it's an early-init setting read before
# mise.toml itself is parsed, so the actual activation comes from
# MISE_AUTO_ENV=1 exported in .zshenv. it's declared here anyway since it
# becomes the mise default in 2027.6.0.
auto_env = true

[dotfiles]
"~/.tmux.conf" = {}
"~/.xinitrc" = {}
"~/.zprofile" = {}
"~/.zshenv" = {}
"~/.zshrc" = {}
"~/.zshrc.d" = { mode = "symlink-each" }
"~/.config/atuin" = { mode = "symlink-each" }
"~/.config/nvim" = {}
"~/.config/ripgrep" = {}

# unlike bat/atuin/ghostty, gitconfig and lazygit pull in their private
# dracula-pro theme file via their own native include/merge mechanism
# ([include] path=, LG_CONFIG_FILE) rather than filesystem symlink-each,
# so these stay plain whole-file symlinks
"~/.gitconfig" = {}
"~/.config/lazygit" = {}

# bat has no local dotfiles content of its own (just `config`) plus a
# private dracula-pro theme file mixed in below, same split as ghostty
"~/.config/bat" = { mode = "symlink-each" }
"~/.config/bat/themes/Dracula Pro (Van Helsing).tmTheme" = { source = "~/repos/dracula-pro/themes/bat/Dracula Pro (Van Helsing).tmTheme" }

# atuin's theme file lives in the private dracula-pro repo, mixed in
# alongside the public config.toml above (symlink-each)
"~/.config/atuin/themes/van-helsing.toml" = { source = "~/repos/dracula-pro/themes/atuin/van-helsing.toml" }

# dircolors sets LS_COLORS for ls/fd/grep aliases (see .zshrc.d/colors.zsh);
# entirely sourced from the private dracula-pro repo, no public half to mix in
"~/.dircolors" = { source = "~/repos/dracula-pro/themes/dircolors/van-helsing" }

# mixes the public repo's own ghostty config with the private dracula-pro
# repo's theme file, so this can't be a single whole-directory symlink
"~/.config/ghostty" = { mode = "symlink-each" }
"~/.config/ghostty/dracula_van-helsing" = { source = "~/repos/dracula-pro/themes/ghostty/van-helsing" }

# self-referential: this file manages its own symlink into mise's global
# config lookup path, so `mise`/tool resolution works from any directory,
# not just from inside ~/.dotfiles. absolute source, not relative — mise's
# global_config_root defaults to $HOME, not to this repo, so a relative
# source would resolve wrong when discovered via the global path.
"~/.config/mise/config.toml" = { source = "~/.dotfiles/mise.toml" }

# mise pairs a generated mise.lock with wherever the config file lives on
# disk, and doesn't follow config.toml's symlink back to this repo — so
# without this, mise forks a second, independently-drifting lockfile at
# ~/.config/mise/mise.lock any time it resolves tools via the global path
# instead of from inside this repo.
"~/.config/mise/mise.lock" = { source = "~/.dotfiles/mise.lock" }

# same self-referential deal as config.toml above, but for the OS-specific
# [bootstrap.packages] overlays (see mise.linux.toml / mise.macos.toml).
# auto_env only activates whichever one matches the host OS, so having a
# linuxbrew install doesn't cause the macOS-only brew packages to install.
"~/.config/mise/config.linux.toml" = { source = "~/.dotfiles/mise.linux.toml" }
"~/.config/mise/config.macos.toml" = { source = "~/.dotfiles/mise.macos.toml" }

# per-host overlays, same self-referential pattern as the OS-specific ones
# above but keyed by MISE_ENV="$(hostname -s)" (see .zshenv) instead of
# auto_env, since mise has no built-in hostname detection. harmless on
# other machines — inert unless MISE_ENV matches the hostname.
"~/.config/mise/config.aptitude.toml" = { source = "~/.dotfiles/mise.aptitude.toml" }

# the [dotfiles] `source = "~/repos/dracula-pro/..."` entries above (atuin,
# bat, dircolors) are a hard dependency on this repo being cloned, not an
# optional overlay: if this clone/pull fails, `mise bootstrap` halts here and
# never reaches the [dotfiles] step, so those entries' "sources do not exist"
# case is never actually hit through normal bootstrap — only if someone runs
# `mise dotfiles apply` standalone without ever running `mise bootstrap` first
[bootstrap.repos]
"~/repos/dracula-pro" = { url = "git@git.0xdad.com:tblyler/dracula-pro.git", ref = "main" }

[bootstrap.user]
login_shell = "/bin/zsh"

# reminds you to install ghostty manually on Linux, since it's deliberately
# not automated (see mise.macos.toml); to create the per-machine gitconfig
# identity file that ~/.gitconfig (tracked, shared) intentionally excludes
# and [include]s instead (see .gitconfig's trailing [include]); and rebuilds
# bat's theme cache so the Van Helsing .tmTheme symlinked in above actually
# gets picked up (bat otherwise silently falls back to its default theme)
[bootstrap.hooks.final]
run = '''
if [ "$(uname)" = "Linux" ]; then
	echo "NOTE: ghostty isn't auto-installed on Linux (no reliable official apt package) - install manually, see https://ghostty.org/docs/install/binary"
fi

if [ ! -f "$HOME/.gitconfig.local" ]; then
	echo "NOTE: ~/.gitconfig.local doesn't exist yet - create it with your [user] block (email/name/signingkey) for this machine, plus a [commit] gpgsign = true once that key is set up; ~/.gitconfig no longer carries either so it can be shared across machines with different emails and before a key exists"
fi

if command -v bat > /dev/null 2>&1; then
	bat cache --build
fi
'''

[tools]
age = "latest"
atuin = "latest"
awscli = "latest"
bat = "latest"
black = "latest"
ctop = "latest"
delta = "latest"
direnv = "latest"
fd = "latest"
fx = "latest"
fzf = "latest"
gh = "latest"
git-lfs = "latest"
glab = "latest"
go = "latest"
"go:github.com/jeffreyc/tag" = "latest"
golangci-lint = "latest"
gron = "latest"
jq = "latest"
lazygit = "latest"
neovim = "latest"
node = "lts"
"npm:ccusage" = "latest"
opentofu = "latest"
pnpm = "latest"
python = "latest"
ripgrep = "latest"
ruff = "latest"
shellcheck = "latest"
sops = "latest"
terragrunt = "latest"
tmux = "latest"
tree-sitter = "latest"
ty = "latest"
usage = "latest"
uv = "latest"
yq = "latest"
zoxide = "latest"
