[settings]
lockfile = true
dotfiles.root = "~/.dotfiles"

# lets mise.linux.toml / mise.macos.toml (and their `config.<os>.toml`
# symlink targets below) load automatically based on the host OS. this
# setting alone does nothing here — it's an early-init setting read before
# mise.toml itself is parsed, so the actual activation comes from
# MISE_AUTO_ENV=1 exported in .zshenv. it's declared here anyway since it
# becomes the mise default in 2027.6.0.
auto_env = true

[dotfiles]
"~/.tmux.conf" = {}
"~/.xinitrc" = {}
"~/.zprofile" = {}
"~/.zshenv" = {}
"~/.zshrc" = {}
"~/.zshrc.d" = { mode = "symlink-each" }
"~/.config/atuin" = {}
"~/.config/nvim" = {}
"~/.config/ripgrep" = {}

# mixes the public repo's own ghostty config with the private dracula-pro
# repo's theme file, so this can't be a single whole-directory symlink
"~/.config/ghostty" = { mode = "symlink-each" }
"~/.config/ghostty/dracula_van-helsing" = { source = "~/repos/dracula-pro/themes/ghostty/van-helsing" }

# self-referential: this file manages its own symlink into mise's global
# config lookup path, so `mise`/tool resolution works from any directory,
# not just from inside ~/.dotfiles. absolute source, not relative — mise's
# global_config_root defaults to $HOME, not to this repo, so a relative
# source would resolve wrong when discovered via the global path.
"~/.config/mise/config.toml" = { source = "~/.dotfiles/mise.toml" }

# mise pairs a generated mise.lock with wherever the config file lives on
# disk, and doesn't follow config.toml's symlink back to this repo — so
# without this, mise forks a second, independently-drifting lockfile at
# ~/.config/mise/mise.lock any time it resolves tools via the global path
# instead of from inside this repo.
"~/.config/mise/mise.lock" = { source = "~/.dotfiles/mise.lock" }

# same self-referential deal as config.toml above, but for the OS-specific
# [bootstrap.packages] overlays (see mise.linux.toml / mise.macos.toml).
# auto_env only activates whichever one matches the host OS, so having a
# linuxbrew install doesn't cause the macOS-only brew packages to install.
"~/.config/mise/config.linux.toml" = { source = "~/.dotfiles/mise.linux.toml" }
"~/.config/mise/config.macos.toml" = { source = "~/.dotfiles/mise.macos.toml" }

[bootstrap.repos]
"~/repos/dracula-pro" = { url = "git@git.0xdad.com:tblyler/dracula-pro.git", ref = "main" }

[bootstrap.user]
login_shell = "/bin/zsh"

# reminds you to install ghostty manually on Linux, since it's deliberately
# not automated (see mise.macos.toml)
[bootstrap.hooks.final]
run = '''
if [ "$(uname)" = "Linux" ]; then
	echo "NOTE: ghostty isn't auto-installed on Linux (no reliable official apt package) - install manually, see https://ghostty.org/docs/install/binary"
fi
'''

[tools]
atuin = "latest"
gh = "latest"
git-lfs = "latest"
glab = "latest"
go = "latest"
"go:github.com/jeffreyc/tag" = "latest"
golangci-lint = "latest"
jq = "latest"
neovim = "latest"
node = "lts"
"npm:ccusage" = "latest"
opentofu = "latest"
pnpm = "latest"
python = "latest"
ripgrep = "latest"
ruff = "latest"
tmux = "latest"
tree-sitter = "latest"
ty = "latest"
usage = "latest"
uv = "latest"
yq = "latest"
